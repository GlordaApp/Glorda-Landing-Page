kind = "web"
previewPath = "/"
title = "Glorda – غلوردا"
version = "1.0.0"
id = "artifacts/glorda-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23178

[services.development]
run = "pnpm --filter @workspace/glorda-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glorda-landing", "run", "build" ]
publicDir = "artifacts/glorda-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23178"
BASE_PATH = "/"
